<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Pro - Complete Secure Tracker</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; --secondary: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 120px; color: #334155; overflow-x: hidden; }
        
        #pin-overlay { position: fixed; inset: 0; background: var(--secondary); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pin-box { background: #1e293b; border: 1px solid #334155; border-radius: 24px; padding: 30px; text-align: center; width: 320px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .pin-input { background: none; border: none; border-bottom: 2px solid var(--primary); color: white; font-size: 32px; width: 120px; text-align: center; letter-spacing: 8px; outline: none; margin: 20px 0; -webkit-text-security: disc; }
        
        #recovery-display { display: none; background: #0f172a; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px dashed var(--success); }
        .code-text { font-family: monospace; color: var(--success); font-weight: bold; font-size: 14px; word-break: break-all; }

        .top-dash { position: sticky; top: 0; z-index: 100; background: var(--secondary); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Interactive Search Utility Block */
        .search-container {
            padding: 15px 20px 5px;
            max-width: 400px;
            margin: 0 auto;
        }
        .search-wrapper {
            position: relative;
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .search-wrapper i { color: #94a3b8; margin-right: 8px; }
        .search-bar {
            width: 100%;
            border: none;
            padding: 12px 0;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            color: #334155;
            background: transparent;
        }

        /* Improved Grid Layout (Better than endless carousel for 20+ cards) */
        .container { max-width: 440px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
        #vaultList {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-top: 10px;
        }
        
        .swipe-item {
            width: 100%;
        }

        /* Physical Credit Card Styling */
        .physical-card {
            border-radius: 16px;
            padding: 25px 20px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 5px;
            color: white;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            overflow: hidden;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Subtle Shine Animation on Card */
        .physical-card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shine 6s infinite; pointer-events: none;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }

        .physical-card input { background: transparent; border: none; color: white; outline: none; font-family: monospace; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .physical-card input::placeholder { color: rgba(255,255,255,0.4); }
        
        .v-bank { font-size: 18px; font-weight: 700; font-family: 'Inter', sans-serif; text-transform: uppercase; width: 85%; border-bottom: 1px solid rgba(255,255,255,0.2) !important; padding-bottom: 5px; margin-bottom: 10px; }
        .chip-icon { font-size: 36px; color: #fbbf24; transform: rotate(90deg); margin-bottom: 5px; opacity: 0.9; }
        
        .input-group-card { display: flex; align-items: center; width: 100%; margin-bottom: 10px; }
        .v-cc { font-size: 22px; letter-spacing: 2px; width: 100%; }
        
        .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
        .card-label { font-size: 9px; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-bottom: 2px; font-family: 'Inter', sans-serif; letter-spacing: 1px;}
        .v-exp { width: 70px; font-size: 18px; }
        .v-cvv { width: 50px; font-size: 18px; letter-spacing: 2px; }

        .delete-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }

        /* Details Container - HIDDEN BY DEFAULT */
        .details-card { 
            display: none; 
            background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-top: 15px; margin-bottom: 15px; 
        }
        
        .section-label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 15px 0 10px; display: flex; align-items: center; gap: 5px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .input-group { position: relative; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; margin-bottom: 10px; }
        .input-group input { width: 100%; border: none; padding: 12px; font-size: 14px; font-weight: 600; outline: none; background: transparent; color: #334155; }
        
        .toggle-btn { padding-right: 12px; color: #94a3b8; cursor: pointer; }
        .physical-card .toggle-btn { color: rgba(255,255,255,0.7); }
        
        .bottom-actions { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 20px 35px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #e2e8f0; z-index: 100; }
        .btn-add-main { background: var(--primary); color: white; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -50px; border: 6px solid white; cursor: pointer; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        .date-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        .hidden { display: none !important; }
        
        .tap-hint { text-align: center; font-size: 10px; color: #94a3b8; font-weight: 600; letter-spacing: 1px; margin-top: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="pin-overlay">
    <div class="pin-box">
        <i class="material-icons-round" style="font-size: 48px; color: var(--primary);">lock_person</i>
        <h2 id="pin-title" style="margin: 10px 0 0;">Enter PIN</h2>
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="pin-field" maxlength="4" class="pin-input" autofocus>
        <div id="recovery-display">
            <p style="font-size: 11px; color: var(--success); margin: 0 0 10px;">SAVE THIS RECOVERY CODE!</p>
            <div class="code-text" id="recovery-code-val"></div>
            <button onclick="unlockVault()" style="margin-top: 15px; background: var(--success); border: none; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; width: 100%;">I'VE SAVED IT</button>
        </div>
        <div id="pin-actions"><a href="#" onclick="handleForgotPin()" style="color: #6366f1; font-size: 12px; text-decoration: none;">Forgot PIN?</a></div>
    </div>
</div>

<div class="top-dash">
    <div style="font-weight: bold; display: flex; align-items: center; gap: 8px;"><i class="material-icons-round">security</i> VAULT PRO</div>
    <div onclick="location.reload()" style="cursor:pointer;"><i class="material-icons-round">logout</i></div>
</div>

<div class="search-container">
    <div class="search-wrapper">
        <i class="material-icons-round">search</i>
        <input type="text" id="searchBar" class="search-bar" placeholder="Search by Bank or Card Number..." oninput="filterCards()">
    </div>
</div>

<div class="container">
    <div id="vaultList"></div>
</div>

<div class="bottom-actions">
    <div onclick="document.getElementById('importFile').click()" style="text-align:center; font-size:10px; color:#64748b; cursor:pointer;"><i class="material-icons-round" style="color:var(--danger)">backup</i><br>RESTORE</div>
    <div class="btn-add-main" onclick="addNew()"><i class="material-icons-round" style="font-size:36px">add</i></div>
    <div onclick="exportData()" style="text-align:center; font-size:10px; color:#64748b; cursor:pointer;"><i class="material-icons-round" style="color:var(--success)">save_alt</i><br>BACKUP</div>
</div>

<input type="file" id="importFile" hidden onchange="importData(event)">

<script>
    const DB_KEY = "Vault_Pro_vComplete";
    const PIN_KEY = "Vault_Master_Pin";
    const REC_KEY = "Vault_Recovery_Key";
    
    const bgGradients = [
        'linear-gradient(135deg, #1e293b 0%, #334155 100%)', 
        'linear-gradient(135deg, #4f46e5 0%, #312e81 100%)', 
        'linear-gradient(135deg, #059669 0%, #064e3b 100%)', 
        'linear-gradient(135deg, #be123c 0%, #881337 100%)', 
        'linear-gradient(135deg, #b45309 0%, #78350f 100%)'  
    ];

    let MASTER_PIN = localStorage.getItem(PIN_KEY);
    let RECOVERY_KEY = localStorage.getItem(REC_KEY);
    let fileHandle = null;

    document.getElementById('pin-field').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
        if(this.value.length === 4) {
            if(!MASTER_PIN) {
                MASTER_PIN = this.value;
                RECOVERY_KEY = Array.from(crypto.getRandomValues(new Uint32Array(4))).map(n => n.toString(36)).join('-').toUpperCase();
                localStorage.setItem(PIN_KEY, MASTER_PIN);
                localStorage.setItem(REC_KEY, RECOVERY_KEY);
                showRecoveryFlow();
            } else if(this.value === MASTER_PIN) {
                unlockVault();
            } else {
                alert("Wrong PIN");
                this.value = "";
            }
        }
    });

    function showRecoveryFlow() {
        document.getElementById('pin-title').innerText = "Security Setup";
        document.getElementById('pin-field').style.display = "none";
        document.getElementById('pin-actions').style.display = "none";
        document.getElementById('recovery-code-val').innerText = RECOVERY_KEY;
        document.getElementById('recovery-display').style.display = "block";
    }

    function handleForgotPin() {
        const input = prompt("Enter your 16-character Recovery Code:");
        if (input && input.toUpperCase() === RECOVERY_KEY) {
            localStorage.removeItem(PIN_KEY);
            alert("Verified. Set a new PIN on next reload.");
            location.reload();
        } else if (input) alert("Invalid Code.");
    }

    function unlockVault() {
        document.getElementById('pin-overlay').style.display = 'none';
        init();
    }

    function init() {
        const saved = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        const container = document.getElementById('vaultList');
        container.innerHTML = "";
        if(saved.length === 0) addNew(); else saved.forEach(s => addNew(s));
    }

    // Dynamic filtering logic matching typed values against card text properties
    function filterCards() {
        const query = document.getElementById('searchBar').value.toLowerCase().trim();
        const items = document.querySelectorAll('.swipe-item');
        
        items.forEach(item => {
            const bankName = item.querySelector('.v-bank').value.toLowerCase();
            const ccNumber = item.querySelector('.v-cc').value.toLowerCase();
            
            if (bankName.includes(query) || ccNumber.includes(query)) {
                item.style.display = "block";
            } else {
                item.style.display = "none";
            }
        });
    }

    function addNew(data = {}) {
        const gridLetters = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P'];
        const cardCount = document.querySelectorAll('.swipe-item').length;
        const assignedGradient = bgGradients[cardCount % bgGradients.length];
        
        let gridHTML = `
            <div class="grid-section-wrapper">
                <div class="section-label" style="justify-content: space-between; display: flex;">
                    <span style="display: flex; align-items: center; gap: 5px;"><i class="material-icons-round" style="font-size:14px">grid_on</i> Grid Values (A-P)</span>
                    <div class="toggle-btn" onclick="toggleGrid(this)" style="padding:0; margin:0;"><i class="material-icons-round" style="font-size:20px">visibility_off</i></div>
                </div>
                <div class="grid-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px;">
        `;
        gridLetters.forEach(l => {
            gridHTML += `
                <div style="background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 8px; text-align: center; padding: 6px 4px;">
                    <label style="margin-bottom: 2px; color: var(--primary); font-size: 11px;">${l}</label>
                    <input type="password" class="v-grid-${l}" inputmode="numeric" maxlength="2" value="${data['grid'+l] || ''}" oninput="autoTab(this); save();" style="padding: 2px; text-align: center; font-size: 16px; width: 100%; box-sizing: border-box; font-weight: 700; letter-spacing: 1px;">
                </div>
            `;
        });
        gridHTML += `</div></div>`;

        const div = document.createElement('div');
        div.className = "swipe-item";
        div.innerHTML = `
            <div class="physical-card" style="background: ${assignedGradient}" onclick="handleCardClick(event, this)">
                <button class="delete-btn" onclick="if(confirm('Delete this card?')){this.closest('.swipe-item').remove(); save();}">×</button>
                <input type="text" class="v-bank" placeholder="BANK NAME" value="${data.bank || ''}" oninput="triggerBankGrid(this); filterCards(); save();">
                <i class="material-icons-round chip-icon">contactless</i>
                
                <div class="input-group-card">
                    <input type="password" class="v-cc" inputmode="numeric" maxlength="19" placeholder="XXXX XXXX XXXX XXXX" value="${data.cc || ''}" oninput="formatCC(this); filterCards(); save();">
                    <div class="toggle-btn" onclick="toggleVis(this)"><i class="material-icons-round">visibility_off</i></div>
                </div>
                
                <div class="card-bottom">
                    <div>
                        <div class="card-label">VALID THRU</div>
                        <input type="text" class="v-exp" inputmode="numeric" placeholder="MM/YY" maxlength="5" value="${data.exp || ''}" oninput="formatExp(this); autoTab(this); save()">
                    </div>
                    <div>
                        <div class="card-label">CVV</div>
                        <div class="input-group-card" style="margin-bottom: 0;">
                            <input type="password" class="v-cvv" inputmode="numeric" placeholder="***" maxlength="4" value="${data.cvv || ''}" oninput="autoTab(this); save()">
                            <div class="toggle-btn" onclick="toggleVis(this)"><i class="material-icons-round">visibility_off</i></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tap-hint">TAP CARD FOR EXTRA INFO</div>

            <div class="details-card">
                <div class="section-label">Netbanking</div>
                <div class="input-group"><input type="text" class="v-user" placeholder="Username" value="${data.user || ''}" oninput="save()"></div>
                <div class="input-group">
                    <input type="password" class="v-pass" placeholder="Password" value="${data.pass || ''}" oninput="save()">
                    <div class="toggle-btn" onclick="toggleVis(this)"><i class="material-icons-round">visibility_off</i></div>
                </div>

                <div class="section-label">Security Q&A</div>
                <div class="input-group">
                    <input type="password" class="v-sq" placeholder="Security Question" value="${data.sq || ''}" oninput="save()">
                    <div class="toggle-btn" onclick="toggleVis(this)"><i class="material-icons-round">visibility_off</i></div>
                </div>
                <div class="input-group">
                    <input type="password" class="v-sa" placeholder="Security Answer" value="${data.sa || ''}" oninput="save()">
                    <div class="toggle-btn" onclick="toggleVis(this)"><i class="material-icons-round">visibility_off</i></div>
                </div>

                ${gridHTML}

                <div class="section-label">Card Management Dates</div>
                <div class="date-grid">
                    <div>
                        <label>Anniversary</label>
                        <div class="input-group"><input type="date" class="v-ann" value="${data.ann || ''}" oninput="save()"></div>
                    </div>
                    <div>
                        <label>Billing Day</label>
                        <div class="input-group"><input type="text" class="v-bill" inputmode="numeric" maxlength="2" placeholder="Day" value="${data.bill || ''}" oninput="autoTab(this); save()"></div>
                    </div>
                    <div>
                        <label>Due Day</label>
                        <div class="input-group"><input type="text" class="v-due" inputmode="numeric" maxlength="2" placeholder="Day" value="${data.due || ''}" oninput="autoTab(this); save()"></div>
                    </div>
                </div>
            </div>
        `;
        const container = document.getElementById('vaultList');
        container.appendChild(div);
        triggerBankGrid(div.querySelector('.v-bank'));

        // Clearing query resets viewport focus cleanly
        document.getElementById('searchBar').value = "";
    }

    function handleCardClick(event, cardEl) {
        if (['INPUT', 'BUTTON', 'I'].includes(event.target.tagName) || event.target.classList.contains('toggle-btn')) {
            return; 
        }
        if (document.activeElement && document.activeElement.tagName === 'INPUT') {
            document.activeElement.blur();
        }

        const swipeItem = cardEl.closest('.swipe-item');
        const detailsCard = swipeItem.querySelector('.details-card');
        
        if (detailsCard.style.display === 'block') {
            detailsCard.style.display = 'none'; 
        } else {
            if (confirm("Do you want to see detailed info (Netbanking, Security Q&A, Dates)?")) {
                detailsCard.style.display = 'block';
                setTimeout(() => {
                    detailsCard.scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'nearest',
                        inline: 'start'
                    });
                }, 80);
            }
        }
    }

    function triggerBankGrid(inputEl) {
        const card = inputEl.closest('.swipe-item');
        const gridSection = card.querySelector('.grid-section-wrapper');
        if (inputEl.value.toUpperCase().includes('ICICI')) {
            gridSection.classList.remove('hidden');
        } else {
            gridSection.classList.add('hidden');
        }
    }

    function autoTab(input) {
        if (input.value.length >= input.maxLength) {
            const card = input.closest('.swipe-item');
            const inputs = Array.from(card.querySelectorAll('input:not([type="hidden"])'));
            const index = inputs.indexOf(input);
            if (index > -1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        }
    }

    function toggleVis(btn) {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        input.type = (input.type === "password") ? "text" : "password";
        icon.innerText = (input.type === "password") ? "visibility_off" : "visibility";
    }

    function toggleGrid(btn) {
        const gridContainer = btn.parentElement.nextElementSibling;
        const inputs = gridContainer.querySelectorAll('input');
        const icon = btn.querySelector('i');
        const isPass = inputs[0].type === "password";
        inputs.forEach(input => input.type = isPass ? "text" : "password");
        icon.innerText = isPass ? "visibility" : "visibility_off";
    }

    function formatCC(input) {
        let v = input.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        if (v.length > 16) v = v.substring(0, 16);
        let parts = v.match(/.{1,4}/g);
        if (parts) input.value = parts.join(' ');
        if (v.length === 16) autoTab(input);
    }

    function formatExp(input) {
        let v = input.value.replace(/\D/g, ''); 
        if (v.length >= 2) input.value = v.substring(0, 2) + '/' + v.substring(2, 4);
        else input.value = v;
    }

    function save() {
        const list = Array.from(document.querySelectorAll('.swipe-item')).map(c => {
            const isICICI = c.querySelector('.v-bank').value.toUpperCase().includes('ICICI');
            return {
                bank: c.querySelector('.v-bank').value,
                user: c.querySelector('.v-user').value, pass: c.querySelector('.v-pass').value,
                sq: c.querySelector('.v-sq').value, sa: c.querySelector('.v-sa').value,
                cc: c.querySelector('.v-cc').value, exp: c.querySelector('.v-exp').value,
                cvv: c.querySelector('.v-cvv').value, ann: c.querySelector('.v-ann').value,
                bill: c.querySelector('.v-bill').value, due: c.querySelector('.v-due').value,
                gridA: isICICI ? c.querySelector('.v-grid-A').value : '',
                gridB: isICICI ? c.querySelector('.v-grid-B').value : '',
                gridC: isICICI ? c.querySelector('.v-grid-C').value : '',
                gridD: isICICI ? c.querySelector('.v-grid-D').value : '',
                gridE: isICICI ? c.querySelector('.v-grid-E').value : '',
                gridF: isICICI ? c.querySelector('.v-grid-F').value : '',
                gridG: isICICI ? c.querySelector('.v-grid-G').value : '',
                gridH: isICICI ? c.querySelector('.v-grid-H').value : '',
                gridI: isICICI ? c.querySelector('.v-grid-I').value : '',
                gridJ: isICICI ? c.querySelector('.v-grid-J').value : '',
                gridK: isICICI ? c.querySelector('.v-grid-K').value : '',
                gridL: isICICI ? c.querySelector('.v-grid-L').value : '',
                gridM: isICICI ? c.querySelector('.v-grid-M').value : '',
                gridN: isICICI ? c.querySelector('.v-grid-N').value : '',
                gridO: isICICI ? c.querySelector('.v-grid-O').value : '',
                gridP: isICICI ? c.querySelector('.v-grid-P').value : ''
            };
        });
        localStorage.setItem(DB_KEY, JSON.stringify(list));
    }

    async function exportData() {
        const dataStr = localStorage.getItem(DB_KEY);
        if (!dataStr || dataStr === "[]") {
            alert("No data to backup!");
            return;
        }

        const defaultName = "Vault_Backup_" + new Date().toISOString().slice(0,10) + ".json";

        if ('showSaveFilePicker' in window) {
            try {
                if (!fileHandle) {
                    fileHandle = await window.showSaveFilePicker({
                        suggestedName: defaultName,
                        types: [{ description: 'JSON Backup', accept: {'application/json': ['.json']} }],
                    });
                } else {
                    const reuse = confirm("Overwrite previous file selection? Click 'Cancel' to alter filename or target location.");
                    if (!reuse) {
                        fileHandle = await window.showSaveFilePicker({
                            suggestedName: defaultName,
                            types: [{ description: 'JSON Backup', accept: {'application/json': ['.json']} }],
                        });
                    }
                }
                const writable = await fileHandle.createWritable();
                await writable.write(dataStr);
                await writable.close();
                alert("Backup securely overwritten and processed!");
                return;
            } catch (err) {
                if (err.name === 'AbortError') return;
                console.error("FileSystem API failed, falling back...", err);
            }
        }

        let fileName = prompt("Enter filename for backup:", defaultName.replace(".json", ""));
        if (fileName === null) return; 
        if (fileName.trim() === "") fileName = "Vault_Backup";
        if (!fileName.endsWith(".json")) fileName += ".json";

        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 100);

        alert("Backup triggered successfully.");
    }

    function importData(event) {
        const reader = new FileReader();
        reader.onload = (e) => { 
            try {
                JSON.parse(e.target.result); 
                localStorage.setItem(DB_KEY, e.target.result); 
                location.reload(); 
            } catch(err) {
                alert("Invalid Backup File");
            }
        };
        reader.readAsText(event.target.files[0]);
    }
</script>
